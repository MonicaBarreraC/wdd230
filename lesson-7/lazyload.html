<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chamber Home Page Build">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
    <title>Lazy Load | W07</title>
</head>

<body>
    <h1>
        Lazy Load
    </h1>

    <div class = "img-grid">
        <picture>
            <img src="images/Deers.png" alt="Two deer in front of Half Dome">
        </picture>
        <picture>
            <img src="images/Tiger.png" alt="A bengal tiger lying on a river">
        </picture>
        <picture>
            <img src="images/Placeholder-300x400.jpg" data-src="images/Dog-1.png" alt="A black/brown Chihuahua dog">
        </picture>
        <picture>
            <img src="images/Placeholder-300x400.jpg" data-src="images/Tucan.png" alt="A Tucan in the trees">
        </picture>
        <picture>
            <img src="images/Placeholder-300x400.jpg" data-src="images/Dog-2.png" alt="A white dog with black glasses">
        </picture>
        <picture>
            <img src="images/Placeholder-300x400.jpg" data-src="images/Chameleon.png" alt="A chameleon among the branches of a tree">
        </picture>
    </div>
</body>

</html>
